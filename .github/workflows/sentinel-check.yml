name: Sentinel-AI System Health Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  integration-check:
    name: Full System Integration
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis/redis-stack:latest
        ports:
          - 6379:6379
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./sentinel-gateway/package-lock.json"

      - name: Install & Build Gateway
        working-directory: ./sentinel-gateway
        run: |
          npm ci
          npm run build

      - name: Setup uv (Python Worker)
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "./sentinel-worker/uv.lock"

      - name: Install & Verify Worker
        working-directory: ./sentinel-worker
        run: |
          # uv automatically environment handle kar lega
          uv sync
          uv run python -m compileall src/

      # 3. Final Verification
      - name: System Verification
        run: echo "Sentinel-AI Architecture is sound and deployable (uv-powered)!"
